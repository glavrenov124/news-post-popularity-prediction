services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: news_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./artifacts:/app/artifacts

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: news_frontend
    ports:
      - "8501:8501"
    depends_on:
      - backend
    environment:
      API_BASE_URL: http://backend:8000